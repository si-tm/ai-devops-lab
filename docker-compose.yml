version: '3.9'

services:
  # ─────────────────────────────────────────
  # SoE: API Server
  # ─────────────────────────────────────────
  api:
    build: ./services/api
    container_name: ai-devops-api
    ports:
      - "3000:3000"
    environment:
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: api
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped
    labels:
      - "com.devops-lab.role=soe"

  # ─────────────────────────────────────────
  # Worker: Queue Consumer → DB Writer
  # ─────────────────────────────────────────
  worker:
    build: ./services/worker
    container_name: ai-devops-worker
    ports:
      - "9091:9091"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:password@postgres:5432/orders
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: worker
      METRICS_PORT: "9091"
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped
    labels:
      - "com.devops-lab.role=worker"

  # ─────────────────────────────────────────
  # Decoupling Layer: Redis Queue
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-devops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    labels:
      - "com.devops-lab.role=queue"

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: ai-devops-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis
    restart: unless-stopped

  # ─────────────────────────────────────────
  # SoR: PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ai-devops-postgres
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    labels:
      - "com.devops-lab.role=sor"

  # ─────────────────────────────────────────
  # Observability: Prometheus
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Observability: Grafana
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ai-devops-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Observability: OpenTelemetry Collector
  # ─────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: ai-devops-otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector metrics
    volumes:
      - ./observability/otel-collector/otel-config.yml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - jaeger
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Observability: Jaeger (Distributed Tracing)
  # ─────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ai-devops-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC (collector)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
